function CoverSpine({title,col,txt,coverUrl,w,h}){
  const [err,setErr]=useState(false);
  return(
    <div style={{width:w||60,height:h||88,borderRadius:5,overflow:"hidden",flexShrink:0,background:col,boxShadow:"2px 3px 8px rgba(0,0,0,.5)"}}>

        :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",padding:4,borderLeft:"2px solid "+txt+"55"}}><div style={{fontSize:7,fontWeight:700,color:txt,textAlign:"center",lineHeight:1.3,fontFamily:SERIF}}>{title.slice(0,20)}</div></div>
      }

}

function MemberPage({members,setMembers,pollVotes,setPollVotes,pop}){
  const [name,setName]=useState("");
  const [bringing,setBringing]=useState("");
  const [address,setAddress]=useState("");
  const m=members.find(x=>x.name===name)||null;
  function handleSelect(e){const n=e.target.value;setName(n);const f=members.find(x=>x.name===n);setBringing(f?f.bringing||"":"");setAddress(f?f.address||"":"");}
  function save(patch){if(!m){pop("Select your name first");return;}setMembers(prev=>prev.map(x=>x.id===m.id?{...x,...patch}:x));pop("Saved!");}
  function toggleDay(day){if(!m)return;setPollVotes(prev=>{const nv={...prev};const already=(nv[day]||[]).includes(m.id);nv[day]=already?nv[day].filter(x=>x!==m.id):[...(nv[day]||[]),m.id];return nv;});}
  function cantMakeIt(){if(!m)return;setPollVotes(prev=>{const nv={...prev};Object.keys(nv).forEach(d=>{nv[d]=(nv[d]||[]).filter(x=>x!==m.id);});return nv;});pop("Response recorded!");}
  const voted=m?Object.values(pollVotes).flat().includes(m.id):false;
  const SP=({done})=>done?<span style={pl(T.sage,T.sageSoft)}>Done</span>:<span style={pl(T.blush,T.blushSoft)}>Pending</span>;
  const cs=(done)=>({...crd(),borderLeft:done?"3px solid "+T.sage:"3px solid "+T.blush});
  return(
    <div style={{padding:"20px 16px 80px"}}>
      <div style={{fontSize:26,fontFamily:SERIF,color:T.cream,marginBottom:16}}>My Profile & Tasks</div>
      <div style={crd()}>
        <label style={lbl}>Your name</label>
        <select value={name} onChange={handleSelect} style={{...inp,background:"#fff"}}>
          <option value="">— Select your name —</option>
          {members.filter(x=>x.rsvp!=="paused").map(x=><option key={x.id} value={x.name}>{x.name}</option>)}
        </select>
        {name&&<div style={{fontSize:12,color:T.creamDim,marginTop:8,fontStyle:"italic"}}>Logged in as {name}</div>}
      </div>
      {m&&<>
        <div style={cs(!!m.rsvp)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:T.cream}}>RSVP for April</div><SP done={!!m.rsvp}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["yes","Going"],["maybe","Maybe"],["no","Can't go"],["cantmake","Can't make it!"]].map(([v,l])=>(
              <button key={v} onClick={()=>save({rsvp:v})} style={{padding:"10px 6px",borderRadius:10,border:"1px solid "+(m.rsvp===v?T.blush:T.borderMed),background:m.rsvp===v?T.blushSoft:"transparent",color:m.rsvp===v?T.blush:T.creamDim,fontSize:13,fontWeight:m.rsvp===v?700:400,cursor:"pointer",gridColumn:v==="cantmake"?"1/-1":"auto"}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={cs(voted)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{fontSize:14,fontWeight:700,color:T.cream}}>Vote — May meeting day</div><SP done={voted}/></div>
          <div style={{fontSize:12,color:T.creamDim,marginBottom:12}}>Select all days that work!</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {POLL_OPTS.map(({day,date})=>{
              const myVote=(pollVotes[day]||[]).includes(m.id);
              return(<button key={day} onClick={()=>toggleDay(day)} style={{padding:"10px",borderRadius:10,border:"1.5px solid "+(myVote?T.blush:T.borderMed),background:myVote?T.blushSoft:T.bg3,cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:13,fontWeight:600,color:myVote?T.blush:T.cream,fontFamily:SERIF}}>{day}</div>
                <div style={{fontSize:11,color:T.creamDim}}>{date}</div>
                {myVote&&<div style={{fontSize:9,color:T.blush,fontWeight:700,marginTop:2,textTransform:"uppercase"}}>Selected</div>}
              </button>);
            })}
          </div>
          <button onClick={cantMakeIt} style={{...gh(T.creamDim),marginTop:10,fontSize:13,padding:"10px"}}>Sorry — Can't make it!</button>
        </div>
        <div style={cs(!!m.bringing)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontSize:14,fontWeight:700,color:T.cream}}>What are you bringing?</div><SP done={!!m.bringing}/></div>
          <input style={{...inp,marginBottom:10}} value={bringing} onChange={e=>setBringing(e.target.value)} placeholder="e.g. wine, chips, sparkling water"/>
          <button onClick={()=>save({bringing})} style={sl(T.blush)}>Save</button>
        </div>
        <div style={cs(!!m.address)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{fontSize:14,fontWeight:700,color:T.cream}}>Your home address</div><SP done={!!m.address}/></div>
          <div style={{fontSize:12,color:T.creamDim,marginBottom:10}}>For future hosting months — admin only.</div>
          <input style={{...inp,marginBottom:10}} value={address} onChange={e=>setAddress(e.target.value)} placeholder="123 Main St, City, State"/>
          <button onClick={()=>save({address})} style={sl(T.blush)}>Save</button>
        </div>
        <div style={cs(m.canHost===true||m.canHost===false)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{fontSize:14,fontWeight:700,color:T.cream}}>Host next month?</div><SP done={m.canHost===true||m.canHost===false}/></div>
          <div style={{fontSize:12,color:T.creamDim,marginBottom:12}}>Can you host in May?</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>save({canHost:true})} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid "+(m.canHost===true?T.sage:T.borderMed),background:m.canHost===true?T.sageSoft:"transparent",color:m.canHost===true?T.sage:T.creamDim,fontSize:13,fontWeight:m.canHost===true?700:400,cursor:"pointer"}}>Yes</button>
            <button onClick={()=>save({canHost:false})} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid "+(m.canHost===false?T.pink:T.borderMed),background:m.canHost===false?T.pinkSoft:"transparent",color:m.canHost===false?T.pink:T.creamDim,fontSize:13,fontWeight:m.canHost===false?700:400,cursor:"pointer"}}>No</button>
          </div>
        </div>
      </>}
    </div>
  );
}

function App(){
  const [authed,setAuthed]=useState(false);
  const [pwErr,setPwErr]=useState(false);
  const [view,setView]=useState("home");
  const [members,setMembers]=useState(MEM0);
  const [noms,setNoms]=useState(NOMS0);
  const [adminOk,setAdminOk]=useState(false);
  const [pinErr,setPinErr]=useState(false);
  const [aTab,setATab]=useState("overview");
  const [toast,setToast]=useState(null);
  const [activeName,setActiveName]=useState("");
  const [mVotes,setMVotes]=useState([]);
  const [pollVotes,setPollVotes]=useState({Thursday:[],Friday:[],Saturday:[],Sunday:[]});
  const [hostAddr,setHostAddr]=useState("");
  const [showFood,setShowFood]=useState(false);
  const [books,setBooks]=useState(PAST);
  const beltRef=useRef(null);
  const pwRef=useRef(null);
  const pinRef=useRef(null);
  const nomTitleRef=useRef(null);
  const nomAuthorRef=useRef(null);
  const nomByRef=useRef(null);

  const pop=m=>{setToast(m);setTimeout(()=>setToast(null),2600);};

  function tryPw(){
    const val=pwRef.current?pwRef.current.value.toLowerCase().trim():"";
    if(val===GROUP_PW){setAuthed(true);setPwErr(false);}
    else{setPwErr(true);if(pwRef.current)pwRef.current.value="";}
  }
  function tryAdmin(){
    const val=pinRef.current?pinRef.current.value:"";
    if(val==="1234"){setAdminOk(true);setView("admin");setPinErr(false);if(pinRef.current)pinRef.current.value="";}
    else{setPinErr(true);if(pinRef.current)pinRef.current.value="";}
  }
  function addNom(){
    const t=nomTitleRef.current?nomTitleRef.current.value:"";
    const a=nomAuthorRef.current?nomAuthorRef.current.value:"";
    const b=nomByRef.current?nomByRef.current.value:"";
    if(!t.trim()||!a.trim()){pop("Title & author required");return;}
    setNoms(n=>[...n,{id:Date.now(),title:t,author:a,nominatedBy:b,votes:0}]);
    if(nomTitleRef.current)nomTitleRef.current.value="";
    if(nomAuthorRef.current)nomAuthorRef.current.value="";
    if(nomByRef.current)nomByRef.current.value="";
    pop("Nomination added!");
  }
  const upvote=id=>setNoms(n=>n.map(x=>x.id===id?{...x,votes:x.votes+1}:x).sort((a,b)=>b.votes-a.votes));

  useEffect(()=>{
    if(view!=="home")return;
    const el=beltRef.current;if(!el)return;
    let x=0,raf,last=null;
    const speed=0.6;
    const tick=(ts)=>{

                <div style={{fontSize:13,fontWeight:700,color:T.cream}}>{f.name}</div>
                <div style={{fontSize:12,color:T.creamDim,lineHeight:1.5,marginTop:2}}>{f.desc}</div>
                {f.bookTie&&<div style={{fontSize:11,color:T.blush,fontStyle:"italic",marginTop:2}}>{f.bookTie}</div>}
              </div>)}
              <div style={{fontSize:10,fontWeight:700,color:T.sage,letterSpacing:.8,textTransform:"uppercase",marginTop:14,marginBottom:8}}>Guests — easy brings</div>
              {FOOD.guestBrings.map((f,i)=><div key={i} style={{marginBottom:8}}><div style={{fontSize:13,fontWeight:700,color:T.cream}}>{f.name}</div><div style={{fontSize:12,color:T.creamDim,marginTop:2}}>{f.desc}</div></div>)}
              <div style={{fontSize:10,fontWeight:700,color:T.sky,letterSpacing:.8,textTransform:"uppercase",marginTop:14,marginBottom:8}}>Drinks</div>
              {FOOD.drinks.map((f,i)=><div key={i} style={{marginBottom:8}}><div style={{fontSize:13,fontWeight:700,color:T.cream}}>{f.name}</div><div style={{fontSize:12,color:T.creamDim,marginTop:2}}>{f.desc}</div></div>)}
              <div style={{marginTop:12,padding:"10px",background:T.bg3,borderRadius:10,fontSize:11,color:T.creamDim,lineHeight:1.6}}><strong style={{color:T.blush}}>Allergy heads-up:</strong> Avoid nuts, strawberry, shellfish, mollusks, gluten, dairy, banana, avocado, sesame.</div>
            </>
          }
        </div>

        {/* Literary feed — cards now clickable */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:T.creamDim,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>In the literary world</div>
          <div style={{overflowX:"auto",marginLeft:-16,marginRight:-16,paddingLeft:16,paddingRight:16,paddingBottom:8}}>
            <div style={{display:"flex",gap:10,width:"max-content"}}>
              {FEED.items.map((item,i)=>{
                const [tc,tb]=TAG_COLS[item.tag]||[T.blush,T.blushSoft];
                return(
                  <a key={i} href={item.link} target="_blank" rel="noreferrer" style={{flexShrink:0,width:160,background:T.card,borderRadius:14,border:"1px solid "+T.border,padding:"14px",display:"flex",flexDirection:"column",gap:6,textDecoration:"none",cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                    <span style={pl(tc,tb)}>{item.tag}</span>
                    <div style={{fontSize:13,fontWeight:700,color:T.cream,fontFamily:SERIF,lineHeight:1.3}}>{item.title}</div>
                    <div style={{fontSize:11,color:T.creamDim,fontStyle:"italic"}}>{item.author}</div>
                    <div style={{fontSize:11,color:T.creamMid,lineHeight:1.5,flex:1}}>{item.blurb}</div>
                    <div style={{fontSize:10,color:T.sky}}>via {item.source} →</div>
                  </a>
                );
              })}
            </div>
          </div>
        </div>

        {/* Conveyor belt */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:T.creamDim,letterSpacing:1,textTransform:"uppercase",marginBottom:12,textAlign:"center"}}>Our reading history</div>
          <div style={{overflow:"hidden",padding:"4px 0 10px"}}>
            <div ref={beltRef} style={{display:"flex",gap:8,width:"max-content",willChange:"transform"}}>
              {[...books,...books,...books].map((b,i)=><CoverSpine key={i} title={b.title} col={b.col} txt={b.txt} coverUrl={b.coverUrl} w={60} h={88}/>)}
            </div>
          </div>
          <div style={{textAlign:"center",marginTop:4}}>
            <button onClick={()=>setView("history")} style={{...gh(T.creamDim),width:"auto",display:"inline-block",padding:"8px 20px",fontSize:12}}>View full list</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
