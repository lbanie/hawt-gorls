}

function MemberPage({members,setMembers,pollVotes,setPollVotes,pop}){
  const [name,setName]=useState("");
  const [bringing,setBringing]=useState("");
  const [address,setAddress]=useState("");
  const m=members.find(x=>x.name===name)||null;

  function handleSelect(e){
    const n=e.target.value; setName(n);
    const f=members.find(x=>x.name===n);
    setBringing(f?f.bringing||"":""); setAddress(f?f.address||"":"");
  }
  function save(patch){if(!m){pop("Select your name first");return;}setMembers(prev=>prev.map(x=>x.id===m.id?{...x,...patch}:x));pop("Saved!");}
  function togglePollDay(day){if(!m){pop("Select your name first");return;}setPollVotes(prev=>{const nv={...prev};const already=(nv[day]||[]).includes(m.id);nv[day]=already?nv[day].filter(x=>x!==m.id):[...(nv[day]||[]),m.id];return nv;});}
  function cantMakeIt(){if(!m){pop("Select your name first");return;}setPollVotes(prev=>{const nv={...prev};Object.keys(nv).forEach(d=>{nv[d]=(nv[d]||[]).filter(x=>x!==m.id);});return nv;});pop("Response recorded!");}

  const voted=m?Object.values(pollVotes).flat().includes(m.id):false;
  const SP=({done})=>done?<span style={pl(T.sage,T.sageSoft)}>Done</span>:<span style={pl(T.blush,T.blushSoft)}>Pending</span>;
  const cs=(done)=>({...crd(),borderLeft:done?"3px solid "+T.sage:"3px solid "+T.blush});

  return (
    <div style={{maxWidth:580,margin:"0 auto",padding:"32px 20px 56px"}}>
      <div style={{fontSize:30,fontFamily:SERIF,color:T.cream,letterSpacing:-.6,marginBottom:20}}>My Profile & Tasks</div>
      <div style={crd()}>
        <div style={{fontSize:13,fontWeight:700,color:T.cream,marginBottom:10}}>Your name</div>
        <select value={name} onChange={handleSelect} style={inp}>
          <option value="">— Select your name —</option>
          {members.filter(x=>x.rsvp!=="paused").map(x=><option key={x.id} value={x.name}>{x.name}</option>)}
        </select>
        {name&&<div style={{fontSize:12,color:T.creamDim,marginTop:8,fontStyle:"italic"}}>Logged in as {name}</div>}
      </div>
      {m&&<>
        <div style={cs(!!m.rsvp)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:T.cream}}>RSVP for April</div><SP done={!!m.rsvp}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["yes","Going"],["maybe","Maybe"],["no","Can't go"],["cantmake","Sorry — Can't make it!"]].map(([v,l])=>(
              <button key={v} onClick={()=>save({rsvp:v})} style={{padding:"9px 8px",borderRadius:10,border:"1px solid "+(m.rsvp===v?T.blush:T.borderMed),background:m.rsvp===v?T.blushSoft:"transparent",color:m.rsvp===v?T.blush:T.creamDim,fontSize:12,fontWeight:m.rsvp===v?700:400,cursor:"pointer",fontFamily:SANS,gridColumn:v==="cantmake"?"1/-1":"auto"}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={cs(voted)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:13,fontWeight:700,color:T.cream}}>Vote on the May meeting day</div><SP done={voted}/>
          </div>
          <div style={{fontSize:11,color:T.creamDim,marginBottom:12}}>First full week of May — select all days that work!</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {POLL_OPTS.map(({day,date})=>{
              const myVote=(pollVotes[day]||[]).includes(m.id);
              return (
                <button key={day} onClick={()=>togglePollDay(day)} style={{padding:"10px 12px",borderRadius:10,border:"1.5px solid "+(myVote?T.blush:T.borderMed),background:myVote?T.blushSoft:T.bg3,cursor:"pointer",textAlign:"left",fontFamily:SANS,width:"100%"}}>
                  <div style={{fontSize:12,fontWeight:600,color:myVote?T.blush:T.cream,fontFamily:SERIF}}>{day}</div>
                  <div style={{fontSize:10,color:T.creamDim}}>{date}</div>
                  {myVote&&<div style={{fontSize:9,color:T.blush,fontWeight:700,marginTop:3,textTransform:"uppercase"}}>Selected</div>}
                </button>
              );
            })}
          </div>
          <button onClick={cantMakeIt} style={{...gh(T.creamDim),width:"100%",marginTop:10,fontSize:12,borderRadius:10,padding:"8px"}}>Sorry — Can't make it!</button>
        </div>
        <div style={cs(!!m.bringing)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:T.cream}}>What are you bringing?</div><SP done={!!m.bringing}/>
          </div>
          <input style={{...inp,marginBottom:10}} value={bringing} onChange={e=>setBringing(e.target.value)} placeholder="e.g. wine, chips, sparkling water"/>
          <button onClick={()=>save({bringing})} style={{...sl(T.blush),width:"100%"}}>Save</button>
        </div>
        <div style={cs(!!m.address)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:13,fontWeight:700,color:T.cream}}>Your home address</div><SP done={!!m.address}/>
          </div>
          <div style={{fontSize:11,color:T.creamDim,marginBottom:10}}>For future hosting months — visible to admin only.</div>
          <input style={{...inp,marginBottom:10}} value={address} onChange={e=>setAddress(e.target.value)} placeholder="123 Main St, City, State"/>
          <button onClick={()=>save({address})} style={{...sl(T.blush),width:"100%"}}>Save</button>
        </div>
        <div style={cs(m.canHost===true||m.canHost===false)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:13,fontWeight:700,color:T.cream}}>Available to host next month?</div><SP done={m.canHost===true||m.canHost===false}/>
          </div>
          <div style={{fontSize:11,color:T.creamDim,marginBottom:12}}>Can you host in May?</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>save({canHost:true})} style={{flex:1,padding:"9px 8px",borderRadius:10,border:"1px solid "+(m.canHost===true?T.sage:T.borderMed),background:m.canHost===true?T.sageSoft:"transparent",color:m.canHost===true?T.sage:T.creamDim,fontSize:12,fontWeight:m.canHost===true?700:400,cursor:"pointer",fontFamily:SANS}}>Yes, I can host</button>
            <button onClick={()=>save({canHost:false})} style={{flex:1,padding:"9px 8px",borderRadius:10,border:"1px solid "+(m.canHost===false?T.pink:T.borderMed),background:m.canHost===false?T.pinkSoft:"transparent",color:m.canHost===false?T.pink:T.creamDim,fontSize:12,fontWeight:m.canHost===false?700:400,cursor:"pointer",fontFamily:SANS}}>No, not next month</button>
          </div>
        </div>
      </>}
    </div>
  );
}

              {members.filter(m=>m.rsvp!=="paused").map(m=>(
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:5,height:5,borderRadius:"50%",background:m.pickedThisYear?T.creamDim:T.sage,flexShrink:0}}/>
                  <span style={{fontSize:11,color:m.pickedThisYear?T.creamDim:T.cream,textDecoration:m.pickedThisYear?"line-through":"none"}}>{m.name}</span>
                  {m.pickedThisYear&&<span style={{fontSize:9,color:T.creamDim}}>picked</span>}
                </div>
              ))}
            </div>
          </div>
        </div>

        <div style={crd({marginBottom:14})}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:T.blush,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Food & Drinks</div>
              <div style={{fontSize:20,fontFamily:SERIF,color:T.cream,letterSpacing:-.3}}>What to bring</div>
              <div style={{fontSize:12,color:T.creamDim,marginTop:4}}>Inspired by {BOOK.title} — allergy-aware.</div>
            </div>
            <button onClick={loadFood} style={{background:food?T.bg4:T.blush,color:food?T.creamMid:"#F2EDE3",border:food?"1px solid "+T.borderMed:"none",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:SANS,flexShrink:0}}>
              {foodLoad?"Loading…":food?"Refresh":"Generate suggestions"}
            </button>
          </div>
          {foodLoad&&<div style={{fontSize:13,color:T.creamDim,fontStyle:"italic"}}>Loading suggestions…</div>}
          {food&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
              <div style={{background:T.bg3,borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:9,fontWeight:700,color:T.gold,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Host — main spread</div>
                {food.hostMain?.map((f,i)=><div key={i} style={{marginBottom:10}}><div style={{fontSize:12,fontWeight:700,color:T.cream}}>{f.name}</div><div style={{fontSize:11,color:T.creamDim,lineHeight:1.5,marginTop:2}}>{f.desc}</div>{f.bookTie&&<div style={{fontSize:10,color:T.blush,fontStyle:"italic",marginTop:3}}>{f.bookTie}</div>}</div>)}
              </div>
              <div style={{background:T.bg3,borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:9,fontWeight:700,color:T.sage,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Guests — easy brings</div>
                {food.guestBrings?.map((f,i)=><div key={i} style={{marginBottom:8}}><div style={{fontSize:12,fontWeight:700,color:T.cream}}>{f.name}</div><div style={{fontSize:11,color:T.creamDim,lineHeight:1.5,marginTop:2}}>{f.desc}</div></div>)}
              </div>
              <div style={{background:T.bg3,borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:9,fontWeight:700,color:T.sky,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Drinks</div>
                {food.drinks?.map((f,i)=><div key={i} style={{marginBottom:8}}><div style={{fontSize:12,fontWeight:700,color:T.cream}}>{f.name}</div><div style={{fontSize:11,color:T.creamDim,lineHeight:1.5,marginTop:2}}>{f.desc}</div></div>)}
                {food.bookTheme&&<div style={{marginTop:12,fontSize:10,color:T.creamDim,fontStyle:"italic",lineHeight:1.6,borderTop:"1px solid "+T.border,paddingTop:10}}>{food.bookTheme}</div>}
              </div>
            </div>
          )}
          {!food&&!foodLoad&&<div style={{background:T.bg3,borderRadius:12,padding:"14px 16px",fontSize:12,color:T.creamDim,lineHeight:1.8}}><strong style={{color:T.blush}}>Allergy heads-up:</strong> Avoid nuts, strawberry, shellfish, mollusks, gluten, dairy, banana, avocado, sesame.</div>}
        </div>

        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{height:1,width:24,background:T.border}}/><div style={{fontSize:10,fontWeight:700,color:T.creamDim,letterSpacing:1,textTransform:"uppercase"}}>In the literary world</div></div>
            <button onClick={loadFeed} style={{...gh(T.creamDim),padding:"4px 12px",fontSize:11,borderRadius:8}}>{feedLoad?"Loading…":"Refresh"}</button>
          </div>
          {feedLoad&&!feed&&<div style={{fontSize:13,color:T.creamDim,fontStyle:"italic",padding:"12px 0"}}>Fetching what's buzzing…</div>}
          {feed&&(
            <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:8}}>
              {feed.items?.map((item,i)=>{
                const [tc,tb]=TAG_COLS[item.tag]||[T.blush,T.blushSoft];
                return (
                  <div key={i} style={{flexShrink:0,width:200,background:T.card,borderRadius:14,border:"1px solid "+T.border,padding:"16px 16px 14px",display:"flex",flexDirection:"column",gap:8}}>
                    <span style={pl(tc,tb)}>{item.tag}</span>
                    <div style={{fontSize:14,fontWeight:700,color:T.cream,fontFamily:SERIF,lineHeight:1.3}}>{item.title}</div>
                    <div style={{fontSize:11,color:T.creamDim,fontStyle:"italic"}}>{item.author}</div>
                    <div style={{fontSize:11,color:T.creamMid,lineHeight:1.5,flex:1}}>{item.blurb}</div>
                    <div style={{fontSize:10,color:T.creamDim}}>via {item.source}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div style={{marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{height:1,flex:1,background:T.border}}/><div style={{fontSize:10,fontWeight:700,color:T.creamDim,letterSpacing:1,textTransform:"uppercase"}}>Our reading history</div><div style={{height:1,flex:1,background:T.border}}/>
          </div>
          <div style={{overflow:"hidden",padding:"4px 0 12px"}}>
            <div ref={beltRef} style={{display:"flex",gap:10,width:"max-content",willChange:"transform"}}>
              {[...PAST,...PAST,...PAST].map((b,i)=><CoverSpine key={i} title={b.title} col={b.col} txt={b.txt} isbn={b.isbn} w={70} h={106}/>)}
            </div>
          </div>
          <div style={{textAlign:"center"}}>
            <button onClick={()=>setView("history")} style={{...gh(T.creamDim),fontSize:12,padding:"6px 16px"}}>View full reading list</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
